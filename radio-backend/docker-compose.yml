version: "3.9"

services:
  icecast:
    image: moul/icecast
    container_name: icecast
    ports:
      - "8080:8000"
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_PASSWORD:-hackme}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:-admin}
      ICECAST_PASSWORD: ${ICECAST_PASSWORD:-hackme}
      ICECAST_RELAY_PASSWORD: ${ICECAST_PASSWORD:-hackme}
    volumes:
      - ./icecast.xml:/etc/icecast.xml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/status-json.xsl"]
      interval: 30s
      timeout: 5s
      retries: 3

  radio:
    build: .
    container_name: radio-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ICECAST_HOST: icecast
      ICECAST_PORT: 8000
      LOG_DIR: /app/logs
    volumes:
      - radio_logs:/app/logs
    depends_on:
      icecast:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  radio_logs:
